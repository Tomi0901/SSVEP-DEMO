<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SSVEP Visual Stimuli & Sinusoidal Models</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        overflow: hidden;
    }
    #menu {
        position: fixed;
        top: 0;
        left: 0;
        width: 260px;
        height: 100vh;
        background: #000;
        border-right: 2px solid #222;
        padding: 20px;
        overflow-y: auto;
    }
    #menu h2 {
        margin-top: 0;
    }
    #menu button {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        background: #222;
        color: white;
        border: 1px solid #444;
        cursor: pointer;
        border-radius: 6px;
        font-size: 15px;
    }
    #menu button:hover {
        background: #333;
    }
    #view {
        position: absolute;
        left: 260px;
        top: 0;
        width: calc(100vw - 260px);
        height: 100vh;
        background: black;
    }
    canvas {
        width: 100%;
        height: 100%;
    }
</style>
</head>
<body>

<div id="menu">
    <h2>Estimulación SSVEP</h2>

    <h3>🔳 Estímulos Visuales</h3>
    <button onclick="runStimulus(10)">Estímulo 10 Hz</button>
    <button onclick="runStimulus(12)">Estímulo 12 Hz</button>
    <button onclick="runStimulus(15)">Estímulo 15 Hz</button>
    <button onclick="runStimulus(20)">Estímulo 20 Hz</button>

    <h3>📈 Funciones Sinusoidales</h3>
    <button onclick="runWave(10)">Función 10 Hz</button>
    <button onclick="runWave(12)">Función 12 Hz</button>
    <button onclick="runWave(15)">Función 15 Hz</button>
    <button onclick="runWave(20)">Función 20 Hz</button>
</div>

<div id="view">
    <canvas id="canvas"></canvas>
</div>

<script>
// ---------------------- CANVAS SETUP ----------------------
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
}
resize();
window.onresize = resize;

let animation = null;

// ---------------------- ESTÍMULO VISUAL ----------------------
function runStimulus(freq){
    cancelAnimationFrame(animation);

    let last = null;
    let visible = false;
    const interval = 1000 / (freq * 2); // parpadeo ON/OFF

    function drawStimulus(ts){
        if(!last) last = ts;
        const diff = ts - last;

        if(diff >= interval){
            visible = !visible;
            last = ts;
        }

        ctx.fillStyle = visible ? "white" : "black";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        animation = requestAnimationFrame(drawStimulus);
    }
    animation = requestAnimationFrame(drawStimulus);
}

// ---------------------- FUNCIÓN SINUSOIDAL ----------------------
function runWave(freq){
    cancelAnimationFrame(animation);

    const A = 0.149;
    const offset = 0.464;
    const fase = Math.PI/2;

    let start = null;

    function drawWave(ts){
        if(!start) start = ts;
        let t = (ts - start) / 1000;

        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;

        for(let x=0; x<canvas.width; x++){
            const tt = t + x / canvas.width;
            const y = A * Math.sin(2*Math.PI*freq*tt + fase) + offset;
            const y_px = canvas.height - y * canvas.height;

            if(x === 0) ctx.moveTo(x, y_px);
            else ctx.lineTo(x, y_px);
        }

        ctx.stroke();
        animation = requestAnimationFrame(drawWave);
    }
    animation = requestAnimationFrame(drawWave);
}

</script>

</body>
</html>
