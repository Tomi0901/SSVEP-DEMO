<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SSVEP - Estímulos y Onda</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #07111f; /* azul noche */
        color: #d0e4ff;
        margin: 0;
        padding: 0;
        text-align: center;
    }

    h1 {
        margin-top: 30px;
        font-size: 30px;
        color: #9bc4ff;
    }

    .section-title {
        margin-top: 40px;
        font-size: 24px;
        font-weight: 700;
        color: #8ab8ff;
    }

    #stimulusBox {
        width: 260px;
        height: 260px;
        margin: 25px auto;
        background-color: rgb(100,100,100);
        border-radius: 10px;
        border: 2px solid #1f3b66;
        box-shadow: 0px 0px 15px #1c3a70;
    }

    .button-group button {
        background-color: #0c1c33;
        border: 1px solid #325a8e;
        color: #d0e4ff;
        padding: 10px 20px;
        margin: 6px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 15px;
    }

    .button-group button:hover {
        background-color: #17325a;
    }

    canvas {
        margin-top: 30px;
        background-color: #0a1526;
        border: 1px solid #264c7a;
        box-shadow: 0px 0px 10px #112544;
    }
</style>
</head>
<body>

<h1>Comunicación Cerebro-Computador SSVEP</h1>

<!-- ===================== ESTÍMULO VISUAL ========================= -->

<div class="section-title">Estímulo Visual Parpadeante</div>

<div id="stimulusBox"></div>

<div class="button-group">
    <button onclick="setFrequency(10)">10 Hz</button>
    <button onclick="setFrequency(12)">12 Hz</button>
    <button onclick="setFrequency(15)">15 Hz</button>
    <button onclick="setFrequency(20)">20 Hz</button>
</div>

<!-- ===================== ONDA ANIMADA ========================= -->

<div class="section-title">Función Sinusoidal Animada</div>

<canvas id="waveCanvas" width="1000" height="220"></canvas>

<div class="button-group">
    <button onclick="waveFreq = 10">Onda 10 Hz</button>
    <button onclick="waveFreq = 12">Onda 12 Hz</button>
    <button onclick="waveFreq = 15">Onda 15 Hz</button>
    <button onclick="waveFreq = 20">Onda 20 Hz</button>
</div>

<!-- ===================== SCRIPT ========================= -->

<script>
/* ---------------- ESTÍMULO VISUAL ---------------- */
let box = document.getElementById("stimulusBox");
let freq = 10;
let startTime = null;

function setFrequency(f) {
    freq = f;
    startTime = null;
}

function animateStimulus(timestamp) {
    if (!startTime) startTime = timestamp;
    let t = (timestamp - startTime) / 1000;

    let gray = 0.464 + 0.149 * Math.sin(2 * Math.PI * freq * t + Math.PI/2);
    gray = Math.max(0.318, Math.min(0.613, gray));

    let g255 = Math.round(gray * 255);
    box.style.backgroundColor = `rgb(${g255},${g255},${g255})`;

    requestAnimationFrame(animateStimulus);
}
requestAnimationFrame(animateStimulus);


/* ---------------- ONDA ANIMADA ---------------- */
let canvas = document.getElementById("waveCanvas");
let ctx = canvas.getContext("2d");
let waveFreq = 10;
let offset = 0;

function animateWave() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    let W = canvas.width;
    let H = canvas.height;

    ctx.strokeStyle = "#8ab8ff";
    ctx.lineWidth = 2;
    ctx.beginPath();

    for (let x = 0; x < W; x++) {
        let t = (x / W) * 5;

        let yVal = 0.464 + 0.149 * Math.sin(2 * Math.PI * waveFreq * (t + offset) + Math.PI / 2);

        let y = H/2 - (yVal - 0.464) * (140 / 0.149);

        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }

    ctx.stroke();

    offset += 0.01;

    requestAnimationFrame(animateWave);
}

animateWave();
</script>

</body>
</html>
